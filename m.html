    .sku-partial { border-left: 4px solid #f59e0b; }

    .badge-picked { background: #d1fae5; color: #065f46; }

<script>
// ── API ──
const GAS_API = 'https://script.google.com/macros/s/AKfycbzdR0YKkz9qERyoZQ8UIyMWlW74r-ihgFPh-pu-jFO4kmIz2yaEfncAAGd2vkaGxXE/exec';

async function api(action, params = {}) {
  const body = { action, ...params };
  try {
    const resp = await fetch(GAS_API, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body),
    });
    const text = await resp.text();
    try { return JSON.parse(text); }
    catch(e) { console.error('API parse error:', text.substring(0, 300)); throw new Error('응답 파싱 실패'); }
  } catch(fetchErr) {
    // fetch 실패 시 JSONP 스타일 fallback (GET)
    console.warn('POST failed, trying GET fallback:', fetchErr);
    const encoded = encodeURIComponent(JSON.stringify(body));
    const resp2 = await fetch(GAS_API + '?payload=' + encoded, { redirect: 'follow' });
    const text2 = await resp2.text();
    try { return JSON.parse(text2); }
    catch(e2) { throw new Error('API 오류: ' + text2.substring(0, 200)); }
  }
}

// ── 상태 ──
let sessions = [];
let currentSession = null;
let skuMap = new Map(); // sku → { name, target, picked, rack }
let barcodeToSku = new Map(); // barcode → sku (바코드→SKU 매핑)
let scannerRunning = false;
let _pickingStartTime = null;
let _pickingTimerInterval = null;
let imageCache = {};

// ── 로그인 ──
document.getElementById('btnLogin').onclick = async () => {
  const pw = document.getElementById('loginPw').value.trim();
  if (!pw) { showLoginError('비밀번호를 입력하세요.'); return; }
  try {
    const r = await api('checkPassword', { password: pw });
    if (r.ok) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('appMain').classList.remove('hidden');
      sessionStorage.setItem('whs_login', '1');
      loadSessions();
      loadBarcodeMap();
    } else {
      showLoginError(r.error || '비밀번호가 올바르지 않습니다.');
    }
  } catch(e) { showLoginError('서버 오류: ' + e.message); }
};
document.getElementById('loginPw').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('btnLogin').click(); };

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.classList.remove('hidden');
}

// 자동 로그인
if (sessionStorage.getItem('whs_login')) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('appMain').classList.remove('hidden');
  loadSessions();
  loadBarcodeMap();
}

document.getElementById('btnLogout').onclick = () => {
  if (isWorkInProgress() && !confirm('작업 중입니다. 로그아웃하시겠습니까?')) return;
  sessionStorage.removeItem('whs_login');
  location.reload();
};

// 작업 중 새로고침/뒤로가기 차단
function isWorkInProgress() {
  if (currentSession && skuMap.size > 0) {
    for (const [, info] of skuMap) { if (info.picked > 0) return true; }
  }
  if (_invCurrentSession && invMap.size > 0) {
    for (const [, info] of invMap) { if (info.scanned > 0) return true; }
  }
  return false;
}
window.addEventListener('beforeunload', (e) => {
  if (isWorkInProgress()) { e.preventDefault(); e.returnValue = ''; }
});

// ── 탭 전환 ──
function switchTab(tab) {
  ['picking','inventory','upload','status'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).className =
      'flex-1 py-2 rounded-lg text-sm font-semibold transition ' + (t === tab ? 'tab-active' : 'tab-inactive');
    document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab);
  });
  if (tab === 'status') loadStatus();
  if (tab === 'inventory' && !_invCurrentSession) loadInvSessions();
  if (tab !== 'picking' && scannerRunning) stopScanner();
  if (tab !== 'inventory' && invScannerRunning) stopInvScanner();
}

// ── 세션 목록 ──
async function loadSessions() {
  const el = document.getElementById('sessionList');
  el.innerHTML = '<div class="text-center text-slate-400 py-6 text-sm"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>로딩 중...</div>';
  try {
    const r = await api('getUploadSessions', { days: 7 });
    if (!r.ok) { el.innerHTML = '<div class="text-center text-red-400 py-4 text-sm">오류: ' + r.error + '</div>'; return; }
    sessions = r.sessions || [];
    if (!sessions.length) {
      el.innerHTML = '<div class="text-center text-slate-400 py-6 text-sm">최근 7일간 업로드된 데이터가 없습니다.</div>';
      return;
    }
    el.innerHTML = sessions.map(s => {
      const dt = new Date(s.uploadTimestamp);
      const label = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const badge = s.picked
        ? '<span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold badge-picked ml-1.5"><i class="fa-solid fa-check mr-0.5"></i>완료</span>'
        : '<span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold badge-unpicked ml-1.5"><i class="fa-solid fa-clock mr-0.5"></i>미피킹</span>';
      const border = s.picked ? 'border-emerald-200' : 'border-indigo-200';
      const bg = s.picked ? 'bg-emerald-50/50' : 'bg-indigo-50/50';
      return `<button onclick="selectSession('${s.uploadTimestamp}')" class="w-full text-left rounded-xl border ${border} ${bg} p-3 active:opacity-70 transition">
        <div class="flex items-center justify-between">
          <div><span class="font-semibold text-slate-700">${label}</span>${badge}</div>
          <span class="text-sm font-semibold text-slate-500">${s.count.toLocaleString()}건</span>
        </div>
        <div class="text-xs text-slate-400 mt-0.5">${s.uploadedBy || ''} · ${s.uploadDate || ''}${s.pickedTimestamp ? ' · 피킹완료 ' + new Date(s.pickedTimestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
      </button>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="text-center text-red-400 py-4 text-sm">로드 실패: ' + e.message + '</div>';
  }
}

// ── 세션 선택 → 피킹 데이터 로드 ──
async function selectSession(ts) {
  const sess = sessions.find(s => s.uploadTimestamp === ts);
  if (sess && sess.picked && !confirm('이미 피킹 완료된 세션입니다.\n다시 피킹하시겠습니까?')) return;

  currentSession = ts;
  skuMap.clear();
  document.getElementById('sessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-indigo-500"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>데이터 로드 중...</div>';

  try {
    const r = await api('getOrdersByUploadSession', { uploadTimestamp: ts });
    if (!r.ok || !r.rows.length) {
      document.getElementById('sessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-slate-400">데이터 없음</div><button onclick="resetPicking()" class="text-xs text-indigo-500 underline">← 세션 목록</button>';
      return;
    }

    // SKU 집계 + 주문번호별 SKU수 카운트 (합포 판별)
    const orderSkuCount = {}; // orderNo → Set of skus
    for (const row of r.rows) {
      if (!row || typeof row !== 'object') continue;
      const sku = String(row.sku || '').trim();
      if (!sku) continue;
      const orderNo = String(row.orderNo || '');
      if (!orderSkuCount[orderNo]) orderSkuCount[orderNo] = new Set();
      orderSkuCount[orderNo].add(sku);
      // 바코드맵에서 바코드/이미지 가져오기
      const si = skuInfoMap[sku] || {};
      // attr에서 WMS 랙위치 파싱 (예: "사이즈:217,WMS:B5" → "B5")
      let rack = '';
      const attrStr = String(row.attr || '');
      const wmsMatch = attrStr.match(/WMS[=:]([^\s,\n]+)/i);
      if (wmsMatch) rack = wmsMatch[1];
      if (skuMap.has(sku)) {
        const existing = skuMap.get(sku);
        existing.target += Number(row.qty) || 0;
        if (!existing.rack && rack) existing.rack = rack;
      } else {
        skuMap.set(sku, { name: row.skuName || '', target: Number(row.qty) || 0, picked: 0, imgUrl: si.imageUrl || null, barcode: si.barcode || '', rack: rack });
      }
    }
    // 합포 판별: SKU가 2종 이상인 주문이 있으면 합포, 또는 수량 > 1이면 합포
    const multiSkuOrders = new Set();
    for (const [orderNo, skus] of Object.entries(orderSkuCount)) {
      if (skus.size > 1) skus.forEach(s => multiSkuOrders.add(s));
    }
    for (const [sku, info] of skuMap) {
      info.isMulti = multiSkuOrders.has(sku) || info.target > 1;
    }

    // UI 업데이트
    const dt = new Date(ts);
    const label = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    document.getElementById('sessionPicker').innerHTML =
      `<div class="flex items-center justify-between">
        <div class="text-sm font-semibold text-indigo-600"><i class="fa-solid fa-boxes-stacked mr-1"></i>${label} · ${r.rows.length}건 · SKU ${skuMap.size}종 · <span id="pickRateBadge">0%</span></div>
        <div class="flex items-center gap-2">
          <span id="pickingTimer" class="text-xs font-mono text-slate-400"><i class="fa-solid fa-stopwatch mr-1"></i>00:00</span>
          <button onclick="resetPicking()" class="text-xs text-slate-400 underline">← 목록</button>
        </div>
      </div>`;
    startPickingTimer();

    document.getElementById('pickingStats').classList.remove('hidden');
    document.getElementById('progressWrap').classList.remove('hidden');
    document.getElementById('scannerArea').classList.remove('hidden');
    // forceCompleteWrap removed - SKU별 완료버튼으로 대체

    // 이미지 로드 (병렬)
    loadSkuImages();
    renderSkuList();
    updateStats();

    // 저장된 피킹 진행상황 복원 (서버→로컬 폴백, 내부에서 renderSkuList+updateStats 재호출)
    await restorePickingProgress(ts);

    // 카메라는 사용자 터치 필요 (브라우저 보안정책)

    // 피킹 이력은 모든 SKU 스캔 완료 시 저장 (updateStats에서 체크)
  } catch(e) {
    document.getElementById('sessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-red-400">오류: ' + e.message + '</div><button onclick="resetPicking()" class="text-xs text-indigo-500 underline">← 세션 목록</button>';
  }
}

let _imageAskedSkus = new Set(); // 이미지 등록 여부 물어본 SKU (세션당 1회)

// ── 피킹 진행상황 저장/복원 ──
function savePickingProgress() {
  if (!currentSession || !skuMap.size) return;
  // 로컬 저장 (즉시 복원용)
  const data = {};
  for (const [sku, info] of skuMap) {
    if (info.picked > 0 || info.hold) data[sku] = { picked: info.picked, hold: !!info.hold };
  }
  sessionStorage.setItem('picking_' + currentSession, JSON.stringify(data));

  // 서버 저장 (PC 공유용, 디바운스 1초)
  clearTimeout(window._saveDetailTimer);
  window._saveDetailTimer = setTimeout(() => flushPickingToServer(), 1000);
}
async function restorePickingProgress(ts) {
  // 1) 서버에서 먼저 시도
  try {
    const res = await api('getPickingDetail', { uploadTimestamp: ts });
    if (res && res.details && res.details.length > 0) {
      for (const d of res.details) {
        const sku = String(d.sku);
        if (skuMap.has(sku)) {
          const info = skuMap.get(sku);
          info.picked = Math.min(d.picked || 0, info.target);
          info.hold = !!d.hold;
        }
      }
      renderSkuList();
      updateStats();
      return;
    }
  } catch(e) { console.warn('서버 피킹상세 로드 실패, 로컬 폴백:', e); }

  // 2) 로컬 sessionStorage 폴백
  try {
    const saved = sessionStorage.getItem('picking_' + ts);
    if (!saved) return;
    const data = JSON.parse(saved);
    for (const [sku, val] of Object.entries(data)) {
      if (!skuMap.has(sku)) continue;
      const info = skuMap.get(sku);
      if (typeof val === 'number') {
        info.picked = Math.min(val, info.target);
      } else if (val && typeof val === 'object') {
        info.picked = Math.min(val.picked || 0, info.target);
        info.hold = !!val.hold;
      }
    }
  } catch(e) {}
}

function resetPicking() {
  stopPickingTimer();
  currentSession = null;
  skuMap.clear();
  _pickingSaved = false;
  _imageAskedSkus.clear();
  document.getElementById('pickingStats').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');
  document.getElementById('scannerArea').classList.add('hidden');
  document.getElementById('lastScanResult').classList.add('hidden');
  // forceCompleteWrap removed
  document.getElementById('skuList').innerHTML = '';
  document.getElementById('sessionPicker').innerHTML =
    '<div class="flex items-center justify-between mb-2"><span class="text-sm font-semibold text-slate-600"><i class="fa-solid fa-list mr-1"></i>업로드 세션</span><button class="text-xs text-indigo-500 font-semibold" onclick="loadSessions()"><i class="fa-solid fa-rotate-right mr-1"></i>새로고침</button></div><div id="sessionList" class="space-y-2 max-h-[35vh] overflow-y-auto"></div>';
  loadSessions();
}

// ── 스캔 효과음 (Web Audio API) ──
const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, duration, type) {
  try {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = type || 'square';
    gain.gain.value = 0.3;
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + duration);
    osc.start(); osc.stop(_audioCtx.currentTime + duration);
  } catch(e) {}
}
function beepOk() { beep(1200, 0.1, 'square'); setTimeout(() => beep(1600, 0.1, 'square'), 80); }
function beepComplete() { beep(800, 0.08, 'square'); setTimeout(() => beep(1200, 0.08, 'square'), 80); setTimeout(() => beep(1600, 0.15, 'square'), 160); }
function beepError() { beep(300, 0.15, 'sawtooth'); setTimeout(() => beep(200, 0.2, 'sawtooth'), 150); }
let _ttsReady = false;
function unlockTTS() {
  if (_ttsReady) return;
  try {
    if ('speechSynthesis' in window) {
      // iOS Safari: 빈 발화로 TTS 잠금 해제
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      speechSynthesis.speak(u);
      _ttsReady = true;
    }
  } catch(e) {}
}
function speak(text) {
  try {
    if ('speechSynthesis' in window) {
      speechSynthesis.cancel(); // 이전 발화 취소 (겹침 방지)
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 1.125; u.volume = 1;
      speechSynthesis.speak(u);
    }
  } catch(e) {}
}
// 첫 터치 시 TTS + AudioContext 잠금 해제
document.addEventListener('click', function _initAudio() {
  unlockTTS();
  _audioCtx.resume();
  document.removeEventListener('click', _initAudio);
}, { once: true });

// ── 바코드 매핑 로드 ──
let skuInfoMap = {}; // sku → { barcode, imageUrl } (바코드맵 전체 정보)
async function loadBarcodeMap() {
  try {
    const r = await api('getBarcodeMap');
    if (r.ok && r.data) {
      barcodeToSku.clear();
      skuInfoMap = {};
      for (const item of r.data) {
        const sku = String(item.sku || '').trim();
        if (!sku) continue;
        skuInfoMap[sku] = { barcode: String(item.barcode || ''), imageUrl: String(item.imageUrl || '') };
        if (item.barcode) {
          barcodeToSku.set(String(item.barcode).trim().toUpperCase(), sku);
        }
      }
      console.log('바코드 매핑:', barcodeToSku.size, '건, SKU정보:', Object.keys(skuInfoMap).length, '건');
    }
  } catch(e) { console.warn('바코드 매핑 로드 실패:', e); }
}

// ── 스캔/피킹 ──
function handleScan(code) {
  if (!code || !skuMap.size) return;
  let sku = code.trim().toUpperCase();

  // 너무 짧은 코드는 무시 (오인식 방지)
  if (sku.length < 4) return;

  // 바코드→SKU 변환 (매핑 테이블 우선)
  if (barcodeToSku.has(sku)) sku = barcodeToSku.get(sku).toUpperCase();

  // SKU 매칭 (정확 매칭 우선, 포함 매칭은 최소 6자 이상만)
  let matched = null;
  const skuRev = sku.split('').reverse().join(''); // 역방향 스캔 대응
  if (skuMap.has(sku)) matched = sku;
  else if (skuMap.has(skuRev)) matched = skuRev;
  else if (sku.length >= 6) {
    // 포함 매칭은 6자 이상일 때만 허용 (짧은 코드의 오매칭 방지)
    for (const [k] of skuMap) {
      const ku = k.toUpperCase();
      if (ku === sku || ku === skuRev || ku.includes(sku) || sku.includes(ku) || ku.includes(skuRev)) { matched = k; break; }
    }
  }

  if (!matched) {
    // 실패 피드백
    beepError();
    if (navigator.vibrate) navigator.vibrate([100,50,100]);
    speak('없는 스큐입니다');
    document.getElementById('lastScanResult').classList.remove('hidden');
    document.getElementById('lastScanSku').textContent = code;
    document.getElementById('lastScanName').textContent = '없는 스큐입니다';
    document.getElementById('lastScanPicked').textContent = '';
    document.getElementById('lastScanTarget').textContent = '';
    document.getElementById('lastScanBadge').innerHTML = '<span class="text-red-400">✗</span>';
    return;
  }

  const info = skuMap.get(matched);

  // 과스캔 방지: 이미 목표수량 완료된 SKU
  if (info.picked >= info.target) {
    beepError();
    if (navigator.vibrate) navigator.vibrate([100,50,100]);
    speak('이미 스캔 완료된 스큐입니다. 과스캔입니다. 수량을 확인하세요.');
    document.getElementById('lastScanResult').classList.remove('hidden');
    document.getElementById('lastScanSku').textContent = matched;
    document.getElementById('lastScanName').textContent = info.name;
    document.getElementById('lastScanPicked').textContent = `${info.picked}/${info.target}`;
    document.getElementById('lastScanTarget').textContent = '⚠️ 과스캔!';
    document.getElementById('lastScanBadge').innerHTML = '<span class="text-orange-500">⚠</span>';
    return;
  }

  info.picked++;
  // 성공 피드백 (상황별 음성)
  const remain = info.target - info.picked;
  if (remain <= 0) {
    beepComplete();
    let allDone = true;
    for (const [, v] of skuMap) { if (v.picked < v.target) { allDone = false; break; } }
    if (allDone) {
      speak('전체 피킹 완료. 오늘도 수고하셨습니다.');
      setTimeout(() => alert('전체 피킹 완료!\n오늘도 수고하셨습니다.'), 500);
    } else {
      speak(`${info.target}개 스캔 완료. 다음 스큐로 넘어갑니다.`);
    }
  } else {
    beepOk();
    speak(`성공. ${remain}개 남음`);
  }
  if (navigator.vibrate) navigator.vibrate(50);

  // 마지막 스캔 표시
  document.getElementById('lastScanResult').classList.remove('hidden');
  document.getElementById('lastScanSku').textContent = matched;
  document.getElementById('lastScanName').textContent = info.name;
  document.getElementById('lastScanPicked').textContent = `${info.picked}/${info.target}`;
  document.getElementById('lastScanTarget').textContent = info.picked >= info.target ? '완료!' : `${info.target - info.picked}개 남음`;
  if (info.imgUrl) {
    document.getElementById('lastScanImg').innerHTML = `<img src="${info.imgUrl}" class="w-full h-full object-cover cursor-pointer" onclick="showImageOverlay('${info.imgUrl}')">`;
  } else {
    document.getElementById('lastScanImg').innerHTML = `<div class="w-full h-full flex flex-col items-center justify-center bg-slate-100 rounded-lg text-slate-400 text-xs"><i class="fa-solid fa-image text-lg"></i></div>`;
    // 이미 물어본 SKU는 다시 안 물어봄
    if (!_imageAskedSkus.has(matched)) {
      _imageAskedSkus.add(matched);
      const wasScannerRunning = scannerRunning;
      if (scannerRunning) { try { Quagga.stop(); Quagga.offDetected(); } catch(e){} scannerRunning = false; }
      showImagePrompt(matched, wasScannerRunning);
    }
  }
  const pct = Math.round((info.picked / info.target) * 100);
  document.getElementById('lastScanBadge').innerHTML = info.picked >= info.target
    ? '<span class="text-emerald-500">✓</span>'
    : `<span class="text-indigo-500">${pct}%</span>`;

  renderSkuList();
  updateStats();
  savePickingProgress();

  // 스캔 결과 2초 후 자동 숨김
  setTimeout(() => {
    document.getElementById('lastScanResult').classList.add('hidden');
  }, 2000);
}

function manualInput() {
  const code = prompt('SKU 코드를 입력하세요:');
  if (code && code.trim()) handleScan(code.trim());
}

// ── SKU 스와이프 액션 ──
function cancelSku(sku) {
  if (!skuMap.has(sku)) return;
  const info = skuMap.get(sku);
  if (info.picked <= 0) return;
  info.picked = 0;
  speak('스캔 취소');
  renderSkuList();
  updateStats();
  savePickingProgress();
}

function holdSku(sku) {
  if (!skuMap.has(sku)) return;
  const info = skuMap.get(sku);
  info.hold = true;
  speak('보류 처리');
  renderSkuList();
  updateStats();
  savePickingProgress();
}

function unholdSku(sku) {
  if (!skuMap.has(sku)) return;
  skuMap.get(sku).hold = false;
  renderSkuList();
  updateStats();
  savePickingProgress();
}

function rollbackSku(sku) {
  if (!skuMap.has(sku)) return;
  const info = skuMap.get(sku);
  info.picked = 0;
  _pickingSaved = false; // 완료 상태 리셋
  speak('피킹 취소');
  renderSkuList();
  updateStats();
  savePickingProgress();
}

// ── SKU별 퀵 완료 ──
function quickComplete(sku) {
  if (!skuMap.has(sku)) return;
  const info = skuMap.get(sku);
  if (info.picked >= info.target) return;
  info.picked = info.target;
  beepComplete();
  speak('스캔 완료');
  renderSkuList();
  updateStats();
  savePickingProgress();
  // 강제완료는 즉시 서버 저장 (디바운스 무시)
  flushPickingToServer();
}

function flushPickingToServer() {
  if (!currentSession || !skuMap.size) return;
  clearTimeout(window._saveDetailTimer);
  const details = [];
  for (const [sku, info] of skuMap) {
    details.push({ sku, skuName: info.name, target: info.target, picked: info.picked, hold: !!info.hold });
  }
  const ts = currentSession;
  // 변경된 것만 전송 (picked>0 또는 hold)
  const sendDetails = details.filter(d => d.picked > 0 || d.hold);
  if (!sendDetails.length) { console.log('[피킹저장] 저장할 데이터 없음, 스킵'); return; }
  console.log('[피킹저장] 전송:', ts, sendDetails.length + '종');

  api('savePickingDetail', { uploadTimestamp: ts, details: sendDetails })
    .then(r => { if (!r || !r.ok) console.warn('[피킹저장] 실패:', r); })
    .catch(e => console.warn('[피킹저장] 에러:', e));
}

// ── 강제 피킹완료 ──
function forceCompletePicking() {
  if (!currentSession || !skuMap.size) return;
  // 미완료 SKU 집계
  let notDone = [];
  for (const [sku, info] of skuMap) {
    if (info.picked < info.target) notDone.push(`${sku}: ${info.picked}/${info.target}`);
  }
  const msg = notDone.length
    ? `⚠️ 미완료 SKU ${notDone.length}건:\n${notDone.slice(0,5).join('\n')}${notDone.length>5?'\n..외 '+(notDone.length-5)+'건':''}\n\n강제 피킹완료 하시겠습니까?`
    : '모든 SKU가 스캔 완료되었습니다.\n피킹완료 처리하시겠습니까?';

  if (!confirm(msg)) return;

  // 피킹 로그 저장 (강제완료 표시)
  let totalQty = 0, pickedQty = 0;
  for (const [, info] of skuMap) { totalQty += info.target; pickedQty += info.picked; }
  api('savePickingLog', {
    uploadTimestamp: currentSession,
    rowCount: totalQty,
    pickedBy: 'mobile_force_complete',
    memo: `강제완료 (${pickedQty}/${totalQty} 스캔됨, 미완료 ${notDone.length}건)`
  }).then(() => {
    alert('강제 피킹완료 처리되었습니다.');
    speak('강제 피킹완료');
    sessionStorage.removeItem('picking_' + currentSession);
    resetPicking();
    loadSessions();
  }).catch(e => alert('저장 실패: ' + e.message));
}

// ── SKU 이미지 촬영 등록 ──
function captureSkuImage(sku, resumeScanner) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) { if (resumeScanner) startScanner(); return; }
    const canvas = document.createElement('canvas');
    const img = new Image();
    img.onload = async () => {
      const maxW = 400;
      const scale = maxW / img.width;
      canvas.width = maxW;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.7);
      try {
        const r = await api('uploadSkuImage', { sku, base64 });
        if (r.ok && r.url) {
          imageCache[sku] = r.url;
          if (skuMap.has(sku)) skuMap.get(sku).imgUrl = r.url;
          document.getElementById('lastScanImg').innerHTML = `<img src="${r.url}" class="w-full h-full object-cover cursor-pointer" onclick="showImageOverlay('${r.url}')">`;
          renderSkuList();
          speak('이미지 등록 완료');
        }
      } catch(err) { console.error('이미지 업로드 실패:', err); }
      // 등록 완료 후 스캐너 재개
      if (resumeScanner) startScanner();
    };
    img.src = URL.createObjectURL(file);
  };
  input.click();
}

// ── 바코드 스캐너 ──
let _lastCode = '', _lastTime = 0, _scanPaused = false;
let _pendingCode = '', _pendingCount = 0; // 연속 일치 확인용

function startScanner() {
  if (scannerRunning) return;
  const vp = document.getElementById('scannerViewport');

  if (typeof Quagga === 'undefined') { alert('QuaggaJS 로드 실패'); return; }
  vp.innerHTML = '<div class="scan-box"></div>';

  Quagga.init({
    inputStream: { name:'Live', type:'LiveStream', target:vp, constraints:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }, area: { top:'20%', right:'5%', left:'5%', bottom:'20%' } },
    decoder: {
      readers:['ean_reader'],
      multiple: false
    },
    locate: true,
    locator: { patchSize: 'medium', halfSample: false },
    frequency: 20
  }, function(err) {
    if (err) { vp.innerHTML = '<div class="w-full h-full flex flex-col items-center justify-center text-slate-400 p-4 text-center"><i class="fa-solid fa-video-slash text-2xl text-red-300 mb-2"></i><div class="text-xs">카메라 사용 불가</div><div class="text-xs mt-1 text-red-300">' + (err.message||'') + '</div><div class="text-xs mt-1">아래 [촬영] 또는 [입력] 사용</div></div>'; return; }
    Quagga.start();
    scannerRunning = true;
    var hint = document.getElementById('scannerTapHint'); if (hint) hint.style.display = 'none';
    // 카메라 멈춤 감지 — 비디오 재생 중단 시 자동 복구
    var videoEl = vp.querySelector('video');
    if (videoEl) {
      videoEl.addEventListener('pause', function() {
        if (scannerRunning) { try { videoEl.play(); } catch(e){} }
      });
    }
    document.getElementById('btnStartScan').classList.add('hidden');
    document.getElementById('btnStopScan').classList.remove('hidden');
    document.getElementById('btnSnapScan').classList.remove('hidden');
  });

  Quagga.offDetected();
  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (!code || _scanPaused) return;
    // 최소 길이 필터 (너무 짧은 오인식 차단)
    if (code.length < 4) return;
    // confidence 체크 (오인식 방지) - 임계값 0.12로 강화
    const errors = result.codeResult.decodedCodes;
    if (errors && errors.length) {
      const errsWithVal = errors.filter(c => c.error !== undefined);
      if (errsWithVal.length === 0) return;
      const avgErr = errsWithVal.reduce((s, c) => s + c.error, 0) / errsWithVal.length;
      if (avgErr > 0.12) return; // 신뢰도 낮으면 무시
    }
    // EAN-13 체크섬 검증 (13자리 숫자일 때)
    if (/^\d{13}$/.test(code)) {
      const digits = code.split('').map(Number);
      const checksum = digits.slice(0, 12).reduce((sum, d, i) => sum + d * (i % 2 === 0 ? 1 : 3), 0);
      if ((10 - (checksum % 10)) % 10 !== digits[12]) return; // 체크섬 불일치 → 무시
    }
    // 모든 스캔은 2회 연속 동일해야 accept (오인식 방지)
    if (_pendingCode === code) { _pendingCount++; } else { _pendingCode = code; _pendingCount = 1; }
    if (_pendingCount < 2) return;
    _pendingCount = 0; _pendingCode = '';
    // 같은 코드 3초 쿨다운
    const now = Date.now();
    if (code === _lastCode && now - _lastTime < 3000) return;
    _lastCode = code; _lastTime = now;

    // 스캔 일시정지 1초 (비디오는 건드리지 않음 — 화이트스크린 방지)
    _scanPaused = true;
    handleScan(code);
    setTimeout(() => { _scanPaused = false; }, 1000);
  });
}

function stopScanner() {
  if (!scannerRunning) return;
  try { Quagga.stop(); Quagga.offDetected(); } catch(e){}
  scannerRunning = false;
  document.getElementById('btnStartScan').classList.remove('hidden');
  document.getElementById('btnStopScan').classList.add('hidden');
  document.getElementById('btnSnapScan').classList.add('hidden');
}

// 즉시 스캔: 현재 화면 캡처하여 바코드 인식
function snapScan() {
  if (!scannerRunning) return;
  const vp = document.getElementById('scannerViewport');
  const videoEl = vp.querySelector('video');
  if (!videoEl) return;
  const canvas = document.createElement('canvas');
  canvas.width = videoEl.videoWidth || 1280;
  canvas.height = videoEl.videoHeight || 720;
  canvas.getContext('2d').drawImage(videoEl, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  Quagga.decodeSingle({
    src: dataUrl, numOfWorkers: 0, locate: true,
    decoder: { readers:['ean_reader','code_128_reader','upc_reader','upc_e_reader'] }
  }, function(result) {
    if (result && result.codeResult && result.codeResult.code) {
      _scanPaused = true;
      if (videoEl) { videoEl.style.opacity = '0'; }
      vp.style.background = '#000';
      handleScan(result.codeResult.code);
      setTimeout(() => {
        if (videoEl) videoEl.style.opacity = '1';
        vp.style.background = 'transparent';
        _scanPaused = false;
      }, 1000);
    } else {
      beepError();
      speak('인식 실패. 다시 시도하세요.');
    }
  });
}

function photoScan() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    if (typeof Quagga !== 'undefined') {
      Quagga.decodeSingle({
        src: url, numOfWorkers: 0, locate: true,
        decoder: { readers:['code_128_reader','ean_reader','code_39_reader','upc_reader'] }
      }, function(result) {
        URL.revokeObjectURL(url);
        if (result && result.codeResult && result.codeResult.code) {
          handleScan(result.codeResult.code);
        } else {
          const code = prompt('바코드 인식 실패. SKU를 직접 입력:');
          if (code) handleScan(code.trim());
        }
      });
    } else {
      URL.revokeObjectURL(url);
      const code = prompt('SKU를 입력하세요:');
      if (code) handleScan(code.trim());
    }
  };
  input.click();
}

// ── SKU 이미지 로드 ──
async function loadSkuImages() {
  const skuList = Array.from(skuMap.keys());
  // 1) 바코드맵에서 가져온 이미지 먼저 적용
  for (const sku of skuList) {
    const si = skuInfoMap[sku];
    if (si && si.imageUrl) {
      imageCache[sku] = si.imageUrl;
      if (skuMap.has(sku)) skuMap.get(sku).imgUrl = si.imageUrl;
    }
  }
  renderSkuList();
  // 2) Drive 이미지도 보조로 로드 (바코드맵에 없는 것만)
  const noImg = skuList.filter(s => !imageCache[s]);
  if (noImg.length) {
    try {
      const r = await api('getSkuImages', { skus: noImg });
      if (r.ok && r.images) {
        for (const [sku, url] of Object.entries(r.images)) {
          imageCache[sku] = url;
          if (skuMap.has(sku)) skuMap.get(sku).imgUrl = url;
        }
        renderSkuList();
      }
    } catch(e) { console.log('Drive 이미지 로드 실패:', e); }
  }
}

// 로케이션 큰 글자 포맷 (영문 bold + 숫자 색상)
function formatRackBig(rack) {
  if (!rack) return '';
  return '<span class="font-mono text-xl leading-tight">' + rack.replace(/([A-Za-z]+)/g, '<span class="font-black text-slate-800">$1</span>').replace(/(\d+)/g, '<span class="font-bold text-indigo-500">$1</span>') + '</span>';
}

// ── UI 렌더링 ──
function renderSkuList(highlightSku) {
  const el = document.getElementById('skuList');
  const entries = Array.from(skuMap.entries()).sort((a,b) => {
    // 1) 완료된 것은 맨 뒤
    const aDone = a[1].picked >= a[1].target ? 1 : 0;
    const bDone = b[1].picked >= b[1].target ? 1 : 0;
    if (aDone !== bDone) return aDone - bDone;
    // 2) 합포 먼저 (isMulti=true 우선)
    const aMulti = a[1].isMulti ? 0 : 1;
    const bMulti = b[1].isMulti ? 0 : 1;
    if (aMulti !== bMulti) return aMulti - bMulti;
    return a[0].localeCompare(b[0]);
  });

  const pending = entries.filter(([,info]) => info.picked < info.target);
  const doneList = entries.filter(([,info]) => info.picked >= info.target);

  // 보류 목록
  const holdList = entries.filter(([,info]) => info.hold);
  const pendingActive = pending.filter(([,info]) => !info.hold);

  let html = '';

  // 보류 건 알림
  if (holdList.length > 0) {
    html += `<div class="bg-amber-50 border border-amber-300 rounded-xl p-2 mb-2 text-xs text-amber-700"><i class="fa-solid fa-clock mr-1"></i>보류 ${holdList.length}건 (수량부족 미출고)</div>`;
  }

  html += pendingActive.map(([sku, info]) => {
    const partial = info.picked > 0;
    const cls = partial ? 'sku-partial' : 'sku-none';
    const tag = info.isMulti ? '<span class="text-[9px] px-1 py-0.5 rounded bg-amber-100 text-amber-600 font-bold">합포</span>' : '<span class="text-[9px] px-1 py-0.5 rounded bg-slate-100 text-slate-400">단포</span>';
    const img = info.imgUrl ? `<img src="${info.imgUrl}" class="w-10 h-10 rounded-lg object-cover cursor-pointer" onclick="event.stopPropagation();showImageOverlay('${info.imgUrl}')">` : `<div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center cursor-pointer" onclick="event.stopPropagation();captureSkuImage('${sku}')"><i class="fa-solid fa-camera text-slate-300 text-xs"></i></div>`;
    const barcodeStr = info.barcode ? `<span class="text-[10px] text-slate-300 ml-1">BC:${info.barcode}</span>` : '';
    const rackFormatted = info.rack ? formatRackBig(info.rack) : '';
    return `<div data-sku="${sku}" class="sku-swipe flex items-center gap-2.5 p-2.5 bg-white rounded-xl border border-slate-100 ${cls}" style="transition:transform 0.2s;touch-action:pan-y;">
      ${img}
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1"><span class="font-mono text-xs font-bold text-slate-700 truncate">${sku}</span>${tag}</div>
        <div class="text-[11px] text-slate-400 truncate">${info.name}</div>
        ${barcodeStr ? '<div class="truncate">' + barcodeStr + '</div>' : ''}
      </div>
      <div class="text-right shrink-0 flex flex-col items-end gap-1">
        ${rackFormatted ? '<div>' + rackFormatted + '</div>' : ''}
        <div class="text-sm font-bold ${partial ? 'text-amber-500' : 'text-slate-400'}">${info.picked}/${info.target}</div>
        <button onclick="event.stopPropagation();quickComplete('${sku}')" class="px-2 py-0.5 rounded bg-red-500 text-white text-[10px] font-semibold active:bg-red-600">강제완료</button>
      </div>
    </div>`;
  }).join('');

  // 보류 SKU 섹션
  if (holdList.length > 0) {
    html += `<details class="mt-2"><summary class="text-xs text-amber-600 font-semibold cursor-pointer py-1"><i class="fa-solid fa-pause-circle mr-1"></i>보류 ${holdList.length}건</summary>
      <div class="space-y-1 mt-1">${holdList.map(([sku, info]) => `<div class="flex items-center gap-2 p-2 bg-amber-50 rounded-lg text-xs">
        <span class="font-mono font-bold text-slate-500">${sku}</span>
        <span class="text-slate-400 truncate flex-1">${info.name}</span>
        <span class="text-amber-500 font-bold">${info.picked}/${info.target}</span>
        <button onclick="event.stopPropagation();unholdSku('${sku}')" class="px-1.5 py-0.5 rounded bg-indigo-500 text-white text-[9px]">복원</button>
      </div>`).join('')}</div></details>`;
  }

  // 완료 SKU 섹션 (피킹취소 기능 포함)
  if (doneList.length > 0) {
    html += `<details class="mt-2"><summary class="text-xs text-emerald-600 font-semibold cursor-pointer py-1">완료 ${doneList.length}건</summary>
      <div class="space-y-1 mt-1">${doneList.map(([sku, info]) => `<div class="flex items-center gap-2 p-2 bg-emerald-50 rounded-lg text-xs">
        <span class="font-mono font-bold text-slate-500">${sku}</span>
        <span class="text-slate-400 truncate flex-1">${info.name}</span>
        <span class="text-emerald-500 font-bold">${info.picked}/${info.target} ✓</span>
        <button onclick="event.stopPropagation();rollbackSku('${sku}')" class="px-1.5 py-0.5 rounded bg-slate-400 text-white text-[9px]">취소</button>
      </div>`).join('')}</div></details>`;
  }

  el.innerHTML = html;

  // 스와이프 제스처 등록
  el.querySelectorAll('.sku-swipe').forEach(div => {
    let startX = 0, dx = 0;
    div.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dx = 0; }, {passive:true});
    div.addEventListener('touchmove', e => {
      dx = e.touches[0].clientX - startX;
      if (Math.abs(dx) > 10) div.style.transform = `translateX(${dx * 0.5}px)`;
    }, {passive:true});
    div.addEventListener('touchend', () => {
      div.style.transform = '';
      const sku = div.dataset.sku;
      if (dx < -80) { cancelSku(sku); } // 왼쪽 스와이프 = 취소
      else if (dx > 80) { holdSku(sku); } // 오른쪽 스와이프 = 보류
    });
  });
}

let _pickingSaved = false;
function updateStats() {
  let done = 0, total = skuMap.size;
  for (const [, info] of skuMap) {
    if (info.picked >= info.target) done++;
  }
  document.getElementById('statDone').textContent = done;
  document.getElementById('statRemain').textContent = total - done;
  document.getElementById('statTotal').textContent = total;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  const rb = document.getElementById('pickRateBadge');
  if (rb) rb.textContent = pct + '%';

  // 모든 SKU 완료 시 피킹 이력 저장 (보류 건 없고, 모든 수량 스캔 완료)
  let allQtyDone = true;
  let hasHold = false;
  let totalQty = 0, pickedQty = 0;
  for (const [, info] of skuMap) {
    totalQty += info.target;
    pickedQty += info.picked;
    if (info.picked < info.target) allQtyDone = false;
    if (info.hold) hasHold = true;
  }
  if (allQtyDone && !hasHold && total > 0 && !_pickingSaved && currentSession) {
    _pickingSaved = true;
    const elapsed = stopPickingTimer();
    api('savePickingLog', { uploadTimestamp: currentSession, rowCount: totalQty, pickedBy: 'mobile_user', elapsed }).catch(()=>{});
  }
}

// ── 피킹 타이머 ──
function startPickingTimer() {
  _pickingStartTime = Date.now();
  clearInterval(_pickingTimerInterval);
  _pickingTimerInterval = setInterval(() => {
    const el = document.getElementById('pickingTimer');
    if (!el || !_pickingStartTime) return;
    el.innerHTML = '<i class="fa-solid fa-stopwatch mr-1"></i>' + formatElapsed(Date.now() - _pickingStartTime);
  }, 1000);
}

function stopPickingTimer() {
  clearInterval(_pickingTimerInterval);
  _pickingTimerInterval = null;
  if (!_pickingStartTime) return '';
  const elapsed = formatElapsed(Date.now() - _pickingStartTime);
  const el = document.getElementById('pickingTimer');
  if (el) el.innerHTML = '<i class="fa-solid fa-flag-checkered mr-1 text-emerald-500"></i>' + elapsed;
  _pickingStartTime = null;
  return elapsed;
}

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ── 파일 업로드 ──
document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0]; if (!file) return;
  const status = document.getElementById('uploadStatus');
  status.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-indigo-400 mr-1"></i>파일 읽는 중...';

  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type:'array', codepage:65001 });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1 });
    if (rows.length < 2) { status.textContent = '데이터 없음'; return; }

    const headers = rows[0].map(h => String(h||'').trim());
    // 헤더 매칭
    const skuCands = ['SKU코드','SKU','sku코드','sku','품목코드'];
    const qtyCands = ['총출고수량','수량','qty','출고수량'];
    const nameCands = ['sku상품명','상품명','품목명','skuName'];
    const marketCands = ['쇼핑몰','마켓','market','채널'];
    const orderCands = ['주문번호','orderNo','주문no','주문No'];
    const amtCands = ['금액','amount','결제금액'];
    const recipCands = ['수령자명','수령자','받는분','recipient'];
    const attrCands = ['SKU상품속성','속성','옵션','attr'];
    const trackCands = ['운송장번호','운송장','trackingNo','송장번호'];

    function findIdx(cands) { return headers.findIndex(h => cands.some(c => h.includes(c) || h.toLowerCase() === c.toLowerCase())); }
    const iSku = findIdx(skuCands), iQty = findIdx(qtyCands), iName = findIdx(nameCands);
    const iMarket = findIdx(marketCands), iOrder = findIdx(orderCands);
    const iAmt = findIdx(amtCands), iRecip = findIdx(recipCands);
    const iAttr = findIdx(attrCands), iTrack = findIdx(trackCands);

    if (iSku < 0 || iQty < 0) { status.textContent = 'SKU코드 또는 수량 컬럼을 찾을 수 없습니다.'; return; }

    const uploadDate = file.name.replace(/[^0-9]/g,'').slice(0,8) || new Date().toISOString().slice(0,10).replace(/-/g,'');
    const serverRows = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i] || [];
      const sku = String(r[iSku]||'').trim(); if (!sku) continue;
      serverRows.push({
        orderNo: iOrder >= 0 ? String(r[iOrder]||'').trim() : `${file.name}_row_${i}`,
        sku, skuName: iName >= 0 ? String(r[iName]||'').trim() : '',
        qty: Number(r[iQty]) || 0,
        market: iMarket >= 0 ? String(r[iMarket]||'').trim() : '',
        amount: iAmt >= 0 ? Number(String(r[iAmt]||'0').replace(/[^0-9.-]/g,'')) || 0 : 0,
        recipient: iRecip >= 0 ? String(r[iRecip]||'').trim() : '',
        attr: iAttr >= 0 ? String(r[iAttr]||'').trim() : '',
        trackingNo: iTrack >= 0 ? String(r[iTrack]||'').trim() : '',
        uploadDate
      });
    }

    status.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin text-indigo-400 mr-1"></i>${serverRows.length}건 서버 저장 중...`;
    const result = await api('serverUploadOrders', { rows: serverRows, uploadedBy: 'mobile_user' });

    if (result.ok) {
      status.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500 mr-1"></i>${file.name} · 저장 ${result.saved}건 · 중복 ${result.duplicates}건`;
      // 세션 목록 새로고침
      setTimeout(() => { switchTab('picking'); loadSessions(); }, 1500);
    } else {
      status.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400 mr-1"></i>실패: ${result.error}`;
    }
  } catch(e) {
    status.textContent = '오류: ' + e.message;
  }
  e.target.value = '';
};

async function selectInvSession(ts) {
  _invCurrentSession = ts;
  invMap.clear();
  document.getElementById('invSessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-indigo-500"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>SKU 로드 + 이카운트 재고 조회 중...</div>';

  try {
    // 1) 피킹 세션의 주문데이터에서 SKU 추출
    const r = await api('getOrdersByUploadSession', { uploadTimestamp: ts });
    if (!r.ok || !r.rows.length) {
      document.getElementById('invSessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-slate-400">데이터 없음</div><button onclick="resetInventory()" class="text-xs text-indigo-500 underline">← 목록</button>';
      return;
    }
    // SKU 집계 (피킹 출고수량)
    const skuAgg = {};
    for (const row of r.rows) {
      const sku = String(row.sku || '').trim();
      if (!sku) continue;
      if (!skuAgg[sku]) skuAgg[sku] = { name: row.skuName || '', pickQty: 0 };
      skuAgg[sku].pickQty += Number(row.qty) || 0;
    }
    const skuList = Object.keys(skuAgg);

    // 2) 이카운트 재고 조회
    const today = new Date();
    const baseDate = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
    const inv = await api('ecountGetInventory', { baseDate, whCode: '00003', skuList });

    const ecountMap = {};
    if (inv.ok && inv.results) {
      for (const item of inv.results) {
        const pc = String(item.PROD_CD || '').trim();
        ecountMap[pc] = { qty: Number(item.BAL_QTY || 0), name: String(item.PROD_DES || '') };
      }
    }

    // 3) invMap 구성
    for (const [sku, agg] of Object.entries(skuAgg)) {
      const ec = ecountMap[sku] || ecountMap[sku.toUpperCase()] || {};
      invMap.set(sku, {
        name: agg.name || ec.name || '',
        ecountQty: ec.qty !== undefined ? ec.qty : '?',
        pickQty: agg.pickQty,
        scanned: 0
      });
    }

    // UI
    const dt = new Date(ts);
    const label = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    document.getElementById('invSessionPicker').innerHTML =
      `<div class="flex items-center justify-between mb-1">
        <div class="text-xs text-slate-400">${label} 세션 기준</div>
        <button onclick="resetInventory()" class="text-xs text-slate-400 underline">← 목록</button>
      </div>`;
    document.getElementById('invSession').classList.remove('hidden');
    document.getElementById('invCount').textContent = invMap.size;
    updateInvStats();
    renderInvList();
  } catch(e) {
    document.getElementById('invSessionPicker').innerHTML = '<div class="text-center py-4 text-sm text-red-400">오류: ' + e.message + '</div><button onclick="resetInventory()" class="text-xs text-indigo-500 underline">← 목록</button>';
  }
}

function handleInvScan(code) {
  if (!code || !invMap.size) return;
  let sku = code.trim().toUpperCase();
  if (sku.length < 4) return;

  // 바코드→SKU 변환
  if (barcodeToSku.has(sku)) sku = barcodeToSku.get(sku).toUpperCase();

  // SKU 매칭
  let matched = null;
  if (invMap.has(sku)) matched = sku;
  else {
    for (const [k] of invMap) { if (k.toUpperCase() === sku) { matched = k; break; } }
  }
  if (!matched && sku.length >= 6) {
    for (const [k] of invMap) {
      const ku = k.toUpperCase();
      if (ku.includes(sku) || sku.includes(ku)) { matched = k; break; }
    }
  }

  if (!matched) {
    beepError();
    if (navigator.vibrate) navigator.vibrate([100,50,100]);
    speak('실사 대상에 없는 스큐입니다');
    document.getElementById('invLastScan').classList.remove('hidden');
    document.getElementById('invLastSku').textContent = code;
    document.getElementById('invLastName').textContent = '대상 외 SKU';
    document.getElementById('invLastScanned').textContent = '';
    document.getElementById('invLastBadge').innerHTML = '<span class="text-red-400">✗</span>';
    return;
  }

  const info = invMap.get(matched);
  info.scanned++;

  beepOk();
  if (navigator.vibrate) navigator.vibrate(50);
  speak(`${info.scanned}개`);

  document.getElementById('invLastScan').classList.remove('hidden');
  document.getElementById('invLastSku').textContent = matched;
  document.getElementById('invLastName').textContent = info.name;
  document.getElementById('invLastScanned').textContent = `스캔: ${info.scanned}`;
  document.getElementById('invLastBadge').innerHTML = `<span class="text-indigo-500">EC:${info.ecountQty}</span>`;

  updateInvStats();
  renderInvList();
  saveInvProgress();
}

function updateInvStats() {
  let total = invMap.size, scanned = 0;
  for (const [, info] of invMap) { if (info.scanned > 0) scanned++; }
  document.getElementById('invStatTotal').textContent = total;
  document.getElementById('invStatScanned').textContent = scanned;
  document.getElementById('invStatRemain').textContent = total - scanned;
  document.getElementById('invChecked').textContent = '스캔: ' + scanned;
  const pct = total > 0 ? Math.round((scanned / total) * 100) : 0;
  document.getElementById('invProgressPct').textContent = pct + '%';
  document.getElementById('invProgressBar').style.width = pct + '%';
}

function renderInvList() {
  const el = document.getElementById('invList');
  const entries = Array.from(invMap.entries()).sort((a,b) => {
    // 스캔 안 된 것 먼저
    const aD = a[1].scanned > 0 ? 1 : 0;
    const bD = b[1].scanned > 0 ? 1 : 0;
    if (aD !== bD) return aD - bD;
    return a[0].localeCompare(b[0]);
  });

  const pending = entries.filter(([,v]) => v.scanned <= 0);
  const done = entries.filter(([,v]) => v.scanned > 0);

  let html = pending.map(([sku, info]) => {
    const si = skuInfoMap[sku] || {};
    const img = si.imageUrl ? `<img src="${si.imageUrl}" class="w-10 h-10 rounded-lg object-cover">` : `<div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center"><i class="fa-solid fa-box text-slate-300 text-xs"></i></div>`;
    return `<div class="flex items-center gap-2.5 p-2.5 bg-white rounded-xl border border-slate-100 sku-none">
      ${img}
      <div class="flex-1 min-w-0">
        <div class="font-mono text-xs font-bold text-slate-700 truncate">${sku}</div>
        <div class="text-[11px] text-slate-400 truncate">${info.name}</div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-xs text-slate-400">EC: <span class="font-bold text-indigo-600">${info.ecountQty}</span></div>
        <div class="text-xs text-slate-300">미스캔</div>
      </div>
    </div>`;
  }).join('');

  if (done.length > 0) {
    html += `<details open class="mt-2"><summary class="text-xs text-emerald-600 font-semibold cursor-pointer py-1">스캔완료 ${done.length}건</summary>
      <div class="space-y-1 mt-1">${done.map(([sku, info]) => {
        const diff = info.scanned - (typeof info.ecountQty === 'number' ? info.ecountQty : 0);
        let diffLabel = '', diffColor = 'text-emerald-500';
        if (diff === 0) { diffLabel = '일치'; diffColor = 'text-emerald-500'; }
        else if (diff > 0) { diffLabel = '+' + diff + ' 과잉'; diffColor = 'text-blue-500'; }
        else { diffLabel = diff + ' 부족'; diffColor = 'text-red-500'; }
        return `<div class="flex items-center gap-2 p-2 bg-emerald-50 rounded-lg text-xs">
          <span class="font-mono font-bold text-slate-500">${sku}</span>
          <span class="text-slate-400 truncate flex-1">${info.name}</span>
          <span class="font-bold text-indigo-500">EC:${info.ecountQty}</span>
          <span class="font-bold text-emerald-600">→${info.scanned}</span>
          <span class="font-bold ${diffColor}">${diffLabel}</span>
        </div>`;
      }).join('')}</div></details>`;
  }
  el.innerHTML = html;
}

function completeInventoryCheck() {
  if (!invMap.size) return;
  let unscanned = 0;
  for (const [, info] of invMap) { if (info.scanned <= 0) unscanned++; }
  if (unscanned > 0 && !confirm(`미스캔 ${unscanned}건이 있습니다.\n실사를 완료하시겠습니까?`)) return;

  stopInvScanner();

  // 결과 계산
  let matchCount = 0, shortCount = 0, overCount = 0;
  const resultRows = [];
  for (const [sku, info] of invMap) {
    const ecQty = typeof info.ecountQty === 'number' ? info.ecountQty : 0;
    const diff = info.scanned - ecQty;
    let status = '일치';
    if (diff < 0) { status = '부족'; shortCount++; }
    else if (diff > 0) { status = '과잉'; overCount++; }
    else { matchCount++; }
    resultRows.push({ sku, name: info.name, ecountQty: ecQty, actual: info.scanned, diff, status });
  }

  // TTS 음성안내
  speak(`실사 완료. 총 ${invMap.size}종. 일치 ${matchCount}건, 부족 ${shortCount}건, 과잉 ${overCount}건.`);
  beepComplete();

  // 결과 화면 표시
  document.getElementById('invSession').classList.add('hidden');
  document.getElementById('invResult').classList.remove('hidden');
  document.getElementById('invResMatch').textContent = matchCount;
  document.getElementById('invResShort').textContent = shortCount;
  document.getElementById('invResOver').textContent = overCount;

  const listEl = document.getElementById('invResultList');
  // 부족 먼저, 과잉, 일치 순
  resultRows.sort((a,b) => {
    const order = { '부족': 0, '과잉': 1, '일치': 2 };
    return (order[a.status] || 2) - (order[b.status] || 2);
  });
  listEl.innerHTML = resultRows.map(r => {
    let border = 'border-emerald-200', bgColor = 'bg-emerald-50', icon = '✓', statusColor = 'text-emerald-600';
    if (r.status === '부족') { border = 'border-red-200'; bgColor = 'bg-red-50'; icon = '▼'; statusColor = 'text-red-600'; }
    else if (r.status === '과잉') { border = 'border-blue-200'; bgColor = 'bg-blue-50'; icon = '▲'; statusColor = 'text-blue-600'; }
    return `<div class="flex items-center gap-2 p-2.5 ${bgColor} rounded-xl border ${border}">
      <div class="flex-1 min-w-0">
        <div class="font-mono text-xs font-bold text-slate-700">${r.sku}</div>
        <div class="text-[11px] text-slate-400 truncate">${r.name}</div>
      </div>
      <div class="text-right shrink-0 text-xs">
        <div>EC: <span class="font-bold">${r.ecountQty}</span> → 실물: <span class="font-bold">${r.actual}</span></div>
        <div class="font-bold ${statusColor}">${icon} ${r.status} ${r.diff !== 0 ? '(' + (r.diff > 0 ? '+' : '') + r.diff + ')' : ''}</div>
      </div>
    </div>`;
  }).join('');

  // 서버에 실사결과 저장 (PC에서 조회용)
  saveInvResult(resultRows);
}

function saveInvProgress() {
  if (!_invCurrentSession || !invMap.size) return;
  clearTimeout(window._saveInvTimer);
  window._saveInvTimer = setTimeout(() => {
    const details = [];
    for (const [sku, info] of invMap) {
      if (info.scanned > 0) details.push({ sku, skuName: info.name, ecountQty: info.ecountQty, scanned: info.scanned });
    }
    if (!details.length) return;
    api('saveInventoryCheck', { uploadTimestamp: _invCurrentSession, details, completed: false })
      .catch(e => console.warn('[실사저장] 에러:', e));
  }, 1500);
}

function saveInvResult(resultRows) {
  if (!_invCurrentSession) return;
  const details = resultRows.map(r => ({ sku: r.sku, skuName: r.name, ecountQty: r.ecountQty, scanned: r.actual, diff: r.diff, status: r.status }));
  api('saveInventoryCheck', { uploadTimestamp: _invCurrentSession, details, completed: true })
    .then(r => { if (!r || !r.ok) console.warn('[실사결과저장] 실패:', r); })
    .catch(e => console.warn('[실사결과저장] 에러:', e));
}

function invPhotoScan() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    if (typeof Quagga !== 'undefined') {
      Quagga.decodeSingle({
        src: url, numOfWorkers: 0, locate: true,
        decoder: { readers: ['ean_reader','code_128_reader','upc_reader'] }
      }, function(result) {
        URL.revokeObjectURL(url);
        if (result && result.codeResult && result.codeResult.code) {
          handleInvScan(result.codeResult.code);
        } else {
          const code = prompt('바코드 인식 실패. SKU를 직접 입력:');
          if (code) handleInvScan(code.trim());
        }
      });
    } else {
      URL.revokeObjectURL(url);
      const code = prompt('SKU를 입력하세요:');
      if (code) handleInvScan(code.trim());
    }
  };
  input.click();
}

// 재고실사 바코드 스캐너 (피킹과 독립)
function startInvScanner() {
  if (invScannerRunning) return;
  const vp = document.getElementById('invScannerViewport');
  if (typeof Quagga === 'undefined') { alert('QuaggaJS 로드 실패'); return; }
  vp.innerHTML = '<div class="scan-box"></div>';

  Quagga.init({
    inputStream: { name:'Live', type:'LiveStream', target:vp, constraints:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }, area: { top:'20%', right:'5%', left:'5%', bottom:'20%' } },
    decoder: { readers:['ean_reader'], multiple: false },
    locate: true,
    locator: { patchSize: 'medium', halfSample: false },
    frequency: 20
  }, function(err) {
    if (err) { vp.innerHTML = '<div class="w-full h-full flex items-center justify-center text-slate-400 p-4 text-center text-xs"><i class="fa-solid fa-video-slash text-red-300 mr-1"></i>카메라 사용 불가. 아래 입력/촬영 이용</div>'; return; }
    Quagga.start();
    invScannerRunning = true;
    var hint = document.getElementById('invScannerTapHint'); if (hint) hint.style.display = 'none';
    var videoEl = vp.querySelector('video');
    if (videoEl) videoEl.addEventListener('pause', function() { if (invScannerRunning) try { videoEl.play(); } catch(e){} });
    document.getElementById('btnInvStopScan').classList.remove('hidden');
  });

  Quagga.offDetected();
  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (!code || _invScanPaused) return;
    if (code.length < 4) return;
    const errors = result.codeResult.decodedCodes;
    if (errors && errors.length) {
      const errsWithVal = errors.filter(c => c.error !== undefined);
      if (errsWithVal.length === 0) return;
      const avgErr = errsWithVal.reduce((s, c) => s + c.error, 0) / errsWithVal.length;
      if (avgErr > 0.12) return;
    }
    if (/^\d{13}$/.test(code)) {
      const digits = code.split('').map(Number);
      const checksum = digits.slice(0, 12).reduce((sum, d, i) => sum + d * (i % 2 === 0 ? 1 : 3), 0);
      if ((10 - (checksum % 10)) % 10 !== digits[12]) return;
    }
    if (_invPendingCode === code) { _invPendingCount++; } else { _invPendingCode = code; _invPendingCount = 1; }
    if (_invPendingCount < 2) return;
    _invPendingCount = 0; _invPendingCode = '';
    const now = Date.now();
    if (code === _invLastCode && now - _invLastTime < 3000) return;
    _invLastCode = code; _invLastTime = now;
    _invScanPaused = true;
    handleInvScan(code);
    setTimeout(() => { _invScanPaused = false; }, 1000);
  });
}

function stopInvScanner() {
  if (!invScannerRunning) return;
  try { Quagga.stop(); Quagga.offDetected(); } catch(e){}
  invScannerRunning = false;
  const btn = document.getElementById('btnInvStopScan');
  if (btn) btn.classList.add('hidden');
}

function exportInventoryResult() {
  if (!invMap.size) return;
  const rows = [['SKU코드', '품목명', '이카운트재고', '실물수량', '차이', '상태']];
  for (const [sku, info] of invMap) {
    const ecQty = typeof info.ecountQty === 'number' ? info.ecountQty : 0;
    const diff = info.scanned - ecQty;
    const status = diff === 0 ? '일치' : (diff < 0 ? '부족' : '과잉');
    rows.push([sku, info.name, ecQty, info.scanned, diff, status]);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '재고실사');
  const d = new Date();
  const fname = `재고실사_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);
}

// ── 이미지 확대 오버레이 ──
function showImageOverlay(src) {
  let ov = document.getElementById('imgOverlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'imgOverlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;padding:20px;';
    ov.onclick = () => ov.remove();
    document.body.appendChild(ov);
  }
  ov.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain;">`;
}
